name: Deploy to GitHub Pages

on:
  # Innesca il deploy ogni volta che fai push sul branch main (o master)
  push:
    branches:
      - main
      - master
  
  # Permette di lanciare il workflow manualmente da GitHub
  workflow_dispatch:

# Imposta i permessi per permettere a GitHub Actions di fare il deploy sulle Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permette un solo deploy alla volta
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Carica la cartella "dist" generata dal comando npm run build
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
